apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mother-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'git@github.com:michaelcampbell-spec/CodeingPain_Capstone_Project.git'
    targetRevision: HEAD
    path: Infrastructure/argo_children
  destination:
    server: 'https://kubernetes.default.svc/'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
