apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: #namespace
spec:
  project: default
  source:
    repoURL: # our git 
    chart: grafana
    targetRevision: 8.5.x
      parameters:
        - name: service.type
          value: ClusterIP
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

