apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: capstonemtnacr.azurecr.io
    chart: helm/kube-prometheus-stack
    targetRevision: 61.3.0
    helm:
      parameters:
        - name: alertmanager.enabled
          value: "false"
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
